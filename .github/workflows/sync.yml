name: HubSpot to Zoho CRM Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          OUTPUT=$(node sync.js 2>&1)
          echo "$OUTPUT"
          NEW_TOKEN=$(echo "$OUTPUT" | grep 'NEW_REFRESH_TOKEN=' | tail -1 | cut -d'=' -f2-)
          if [ -n "$NEW_TOKEN" ]; then
            echo "Updating ZOHO_REFRESH_TOKEN secret..."
            echo "$NEW_TOKEN" | gh secret set ZOHO_REFRESH_TOKEN
            echo "Secret updated successfully"
          fi
